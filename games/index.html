<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>默绘街机厅</title>
<style>
:root{--bg:#090b12;--panel:#111522;--ink:#f4f1e8;--muted:#9097aa;--a:#73f7c7;--b:#ff5f7a;--c:#ffd166;--line:#273049}
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--ink);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,"Noto Sans Mono CJK SC",monospace}button{font:inherit}
#app{width:100%;height:100%;display:grid;place-items:center;background:radial-gradient(circle at 20% 10%,#17233b 0,transparent 34%),radial-gradient(circle at 85% 80%,#25142f 0,transparent 35%),var(--bg)}
.screen{position:absolute;inset:0}.hidden{display:none!important}
#menu{overflow:auto;padding:max(24px,env(safe-area-inset-top)) 18px max(28px,env(safe-area-inset-bottom));}
.wrap{width:min(1080px,100%);margin:auto}.eyebrow{color:var(--a);font-weight:900;letter-spacing:.18em}.title{font-size:clamp(40px,8vw,92px);line-height:.9;margin:10px 0 12px;letter-spacing:-.08em}.lead{color:var(--muted);max-width:700px;line-height:1.7;margin-bottom:26px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}.card{position:relative;min-height:190px;border:2px solid var(--line);background:linear-gradient(145deg,#151a2a,#0e111c);color:var(--ink);padding:20px;text-align:left;cursor:pointer;overflow:hidden;transition:.15s transform,.15s border-color}.card:hover{transform:translateY(-4px);border-color:var(--a)}.card:active{transform:translateY(0)}.card .num{font-size:13px;color:var(--muted)}.card h2{margin:24px 0 8px;font-size:25px}.card p{margin:0;color:var(--muted);line-height:1.55;font-size:13px}.card .icon{position:absolute;right:14px;bottom:-12px;font-size:74px;opacity:.15}.card.link{border-color:#704d27}.tag{display:inline-block;margin-top:14px;padding:5px 8px;border:1px solid var(--line);font-size:11px;color:var(--c)}
#gameScreen{display:grid;place-items:center;padding:10px;background:#05070c}.shell{position:relative;width:min(100vw,1000px);aspect-ratio:3/2;max-height:100vh;background:#0c101a;border:1px solid #2c3856;overflow:hidden;box-shadow:0 20px 80px #000b}canvas{display:block;width:100%;height:100%;touch-action:none;background:#090d18}.topbar{position:absolute;left:0;right:0;top:0;z-index:4;display:flex;align-items:center;justify-content:space-between;padding:12px 14px;pointer-events:none;text-shadow:2px 2px #000}.topbar button{pointer-events:auto;border:1px solid #ffffff44;background:#0b0f19cc;color:#fff;padding:8px 12px;cursor:pointer}.gameName{font-weight:900}.stats{text-align:right;font-weight:900}.stats small{display:block;color:#c4c9d5;font-weight:500}
#touch{position:absolute;left:0;right:0;bottom:max(12px,env(safe-area-inset-bottom));display:flex;justify-content:space-between;align-items:end;padding:0 14px;z-index:5;pointer-events:none}.cluster{display:flex;gap:10px;pointer-events:auto}.touchBtn{width:72px;height:58px;border:2px solid #ffffff66;background:#10182acc;color:#fff;font-weight:900;border-radius:12px;box-shadow:0 5px 0 #0008;touch-action:none}.touchBtn:active,.touchBtn.on{transform:translateY(4px);box-shadow:0 1px 0 #0008;background:#263859}.touchBtn.big{width:104px;background:#5d2240dd}
.overlay{position:absolute;inset:0;z-index:9;display:grid;place-items:center;background:#05070cbb;padding:20px}.dialog{width:min(420px,92%);border:2px solid var(--line);background:#111522;padding:28px;text-align:center;box-shadow:10px 10px 0 #000}.dialog h2{font-size:36px;margin:0 0 8px}.dialog p{color:var(--muted);line-height:1.6}.actions{display:flex;justify-content:center;gap:10px;margin-top:20px}.actions button{border:0;padding:11px 18px;font-weight:900;cursor:pointer}.primary{background:var(--c);color:#111}.secondary{background:#293149;color:#fff}
@media (hover:hover) and (pointer:fine){#touch{opacity:.32}.touchBtn{width:64px;height:50px}}
@media (max-aspect-ratio:3/2){.shell{width:100vw;height:min(100vh,66.666vw)}}
</style>
</head>
<body>
<div id="app">
  <main id="menu" class="screen">
    <div class="wrap">
      <div class="eyebrow">MOHUI WEB ARCADE</div>
      <h1 class="title">默绘<br>街机厅</h1>
      <p class="lead">无需下载，点开即玩。电脑支持键盘，手机支持触屏；每个游戏都会在本机保存最高分。</p>
      <div class="grid">
        <button class="card link" onclick="location.href='../xuefeng/'"><span class="num">01 / 跑酷</span><h2>雪峰冲刺</h2><p>跳过路障，蹲过飞行物，速度会不断提升。</p><span class="tag">独立页面</span><span class="icon">🏃</span></button>
        <button class="card" data-game="snake"><span class="num">02 / 经典</span><h2>霓虹贪吃蛇</h2><p>吃掉能量核，身体变长，节奏逐渐加快。</p><span class="tag">方向键 / 滑动</span><span class="icon">▰</span></button>
        <button class="card" data-game="dodge"><span class="num">03 / 生存</span><h2>陨石闪避</h2><p>在密集弹幕中横向穿梭，捡取星核获得加分。</p><span class="tag">A D / 左右触控</span><span class="icon">☄</span></button>
        <button class="card" data-game="breakout"><span class="num">04 / 反弹</span><h2>弹球拆墙</h2><p>控制挡板反弹能量球，连续击破整片砖墙。</p><span class="tag">鼠标拖动 / 左右键</span><span class="icon">◉</span></button>
        <button class="card" data-game="flap"><span class="num">05 / 节奏</span><h2>一键飞行</h2><p>只需要一个按键，但想飞得远并不简单。</p><span class="tag">空格 / 点击</span><span class="icon">◆</span></button>
      </div>
    </div>
  </main>

  <section id="gameScreen" class="screen hidden">
    <div class="shell">
      <canvas id="game" width="900" height="600"></canvas>
      <div class="topbar"><button id="back">← 游戏厅</button><div class="gameName" id="gameName"></div><div class="stats"><span id="score">0</span><small>HI <span id="high">0</span></small></div></div>
      <div id="touch"><div class="cluster"><button class="touchBtn" id="left">←</button><button class="touchBtn" id="right">→</button></div><div class="cluster" id="extra"></div></div>
      <div id="over" class="overlay hidden"><div class="dialog"><h2 id="overTitle">结束</h2><p id="overText"></p><div class="actions"><button class="primary" id="retry">再来一局</button><button class="secondary" id="menuBtn">返回游戏厅</button></div></div></div>
    </div>
  </section>
</div>
<script>
(()=>{
'use strict';
const C=document.getElementById('game'),X=C.getContext('2d'),W=C.width,H=C.height;
const menu=document.getElementById('menu'),screen=document.getElementById('gameScreen'),scoreEl=document.getElementById('score'),highEl=document.getElementById('high'),nameEl=document.getElementById('gameName'),over=document.getElementById('over'),overTitle=document.getElementById('overTitle'),overText=document.getElementById('overText'),extra=document.getElementById('extra');
const input={l:false,r:false,up:false,down:false,action:false,pressed:false,pointer:null};
let current=null,last=performance.now(),audio=null;
const names={snake:'霓虹贪吃蛇',dodge:'陨石闪避',breakout:'弹球拆墙',flap:'一键飞行'};
function hiKey(k){return 'mohuiArcade_'+k}
function getHi(k){return +(localStorage.getItem(hiKey(k))||0)}
function beep(f=440,d=.05,type='square',vol=.025){try{audio||=new(window.AudioContext||window.webkitAudioContext)();const o=audio.createOscillator(),g=audio.createGain();o.type=type;o.frequency.value=f;g.gain.value=vol;g.gain.exponentialRampToValueAtTime(.0001,audio.currentTime+d);o.connect(g).connect(audio.destination);o.start();o.stop(audio.currentTime+d)}catch(e){}}
function rect(x,y,w,h,c){X.fillStyle=c;X.fillRect(x,y,w,h)}
function txt(s,x,y,n=24,a='left',c='#fff'){X.font=`900 ${n}px ui-monospace,monospace`;X.textAlign=a;X.textBaseline='middle';X.fillStyle=c;X.fillText(s,x,y)}
function bg(grid=true){rect(0,0,W,H,'#080c16');if(grid){X.strokeStyle='#182038';X.lineWidth=1;for(let x=0;x<W;x+=50){X.beginPath();X.moveTo(x,0);X.lineTo(x,H);X.stroke()}for(let y=0;y<H;y+=50){X.beginPath();X.moveTo(0,y);X.lineTo(W,y);X.stroke()}}}
function setScore(v){scoreEl.textContent=Math.floor(v)}
function end(title,text){if(!current||current.dead)return;current.dead=true;const s=Math.floor(current.score||0),old=getHi(current.id);if(s>old)localStorage.setItem(hiKey(current.id),s);highEl.textContent=Math.max(old,s);overTitle.textContent=title;overText.textContent=text+` 本局得分：${s}`;over.classList.remove('hidden');beep(130,.35,'sawtooth',.05)}
function clearInput(){Object.assign(input,{l:false,r:false,up:false,down:false,action:false,pressed:false,pointer:null})}
function start(id){clearInput();current=games[id]();current.id=id;current.dead=false;menu.classList.add('hidden');screen.classList.remove('hidden');over.classList.add('hidden');nameEl.textContent=names[id];highEl.textContent=getHi(id);scoreEl.textContent='0';setupControls(id);current.init();}
function quit(){current=null;screen.classList.add('hidden');menu.classList.remove('hidden');over.classList.add('hidden');clearInput()}
function setupControls(id){extra.innerHTML='';document.getElementById('left').style.display=['snake','flap'].includes(id)?'none':'';document.getElementById('right').style.display=['snake','flap'].includes(id)?'none':'';if(id==='snake'){extra.innerHTML='<button class="touchBtn" data-dir="up">↑</button><button class="touchBtn" data-dir="down">↓</button><button class="touchBtn" data-dir="left">←</button><button class="touchBtn" data-dir="right">→</button>'}else if(id==='flap'){extra.innerHTML='<button class="touchBtn big" data-act="1">起飞</button>'}else if(id==='breakout'){extra.innerHTML='<button class="touchBtn big" data-act="1">发球</button>'}bindDynamic()}
function bindHold(el,key){const a=e=>{e.preventDefault();input[key]=true;el.classList.add('on')},b=e=>{e.preventDefault();input[key]=false;el.classList.remove('on')};el.onpointerdown=a;el.onpointerup=b;el.onpointercancel=b;el.onpointerleave=b}
bindHold(document.getElementById('left'),'l');bindHold(document.getElementById('right'),'r');
function bindDynamic(){extra.querySelectorAll('[data-dir]').forEach(b=>b.onpointerdown=e=>{e.preventDefault();const d=b.dataset.dir;if(current?.id==='snake')current.turn(d)});extra.querySelectorAll('[data-act]').forEach(b=>{b.onpointerdown=e=>{e.preventDefault();input.action=true;input.pressed=true;b.classList.add('on')};b.onpointerup=b.onpointercancel=e=>{e.preventDefault();input.action=false;b.classList.remove('on')}})}
document.querySelectorAll('[data-game]').forEach(b=>b.onclick=()=>start(b.dataset.game));document.getElementById('back').onclick=quit;document.getElementById('menuBtn').onclick=quit;document.getElementById('retry').onclick=()=>start(current.id);
addEventListener('keydown',e=>{if(['ArrowLeft','KeyA'].includes(e.code))input.l=true;if(['ArrowRight','KeyD'].includes(e.code))input.r=true;if(['ArrowUp','KeyW'].includes(e.code))input.up=true;if(['ArrowDown','KeyS'].includes(e.code))input.down=true;if(['Space','Enter'].includes(e.code)){if(!input.action)input.pressed=true;input.action=true}if(current?.turn){if(e.code==='ArrowUp'||e.code==='KeyW')current.turn('up');if(e.code==='ArrowDown'||e.code==='KeyS')current.turn('down');if(e.code==='ArrowLeft'||e.code==='KeyA')current.turn('left');if(e.code==='ArrowRight'||e.code==='KeyD')current.turn('right')}if(current)e.preventDefault()});
addEventListener('keyup',e=>{if(['ArrowLeft','KeyA'].includes(e.code))input.l=false;if(['ArrowRight','KeyD'].includes(e.code))input.r=false;if(['ArrowUp','KeyW'].includes(e.code))input.up=false;if(['ArrowDown','KeyS'].includes(e.code))input.down=false;if(['Space','Enter'].includes(e.code))input.action=false});
let swipe=null;C.addEventListener('pointerdown',e=>{const r=C.getBoundingClientRect();input.pointer={x:(e.clientX-r.left)/r.width*W,y:(e.clientY-r.top)/r.height*H};swipe={...input.pointer};input.pressed=true;input.action=true});C.addEventListener('pointermove',e=>{if(!input.pointer)return;const r=C.getBoundingClientRect();input.pointer={x:(e.clientX-r.left)/r.width*W,y:(e.clientY-r.top)/r.height*H}});C.addEventListener('pointerup',e=>{if(current?.id==='snake'&&swipe&&input.pointer){const dx=input.pointer.x-swipe.x,dy=input.pointer.y-swipe.y;if(Math.max(Math.abs(dx),Math.abs(dy))>22)current.turn(Math.abs(dx)>Math.abs(dy)?(dx>0?'right':'left'):(dy>0?'down':'up'))}input.pointer=null;swipe=null;input.action=false});

const games={
snake:()=>{
 const g={score:0,dir:'right',next:'right',snake:[],food:null,t:0,step:.13,turn(d){const opp={left:'right',right:'left',up:'down',down:'up'};if(d!==opp[this.dir])this.next=d},init(){this.snake=[{x:8,y:8},{x:7,y:8},{x:6,y:8}];this.spawn()},spawn(){do{this.food={x:Math.floor(Math.random()*26),y:Math.floor(Math.random()*16)}}while(this.snake.some(p=>p.x===this.food.x&&p.y===this.food.y))},update(dt){if(this.dead)return;this.t+=dt;if(this.t<this.step)return;this.t=0;this.dir=this.next;const h={...this.snake[0]};if(this.dir==='left')h.x--;if(this.dir==='right')h.x++;if(this.dir==='up')h.y--;if(this.dir==='down')h.y++;if(h.x<0||h.x>=26||h.y<0||h.y>=16||this.snake.some(p=>p.x===h.x&&p.y===h.y)){end('线路断开','蛇撞上了边界或自己。');return}this.snake.unshift(h);if(h.x===this.food.x&&h.y===this.food.y){this.score+=100;this.step=Math.max(.055,this.step-.004);this.spawn();beep(680,.05)}else this.snake.pop();setScore(this.score)},draw(){bg();const ox=60,oy=60,s=30;rect(ox-4,oy-4,26*s+8,16*s+8,'#24304b');rect(ox,oy,26*s,16*s,'#0b1120');X.fillStyle='#ff5f7a';X.beginPath();X.arc(ox+(this.food.x+.5)*s,oy+(this.food.y+.5)*s,10+Math.sin(performance.now()/100)*2,0,7);X.fill();this.snake.forEach((p,i)=>{rect(ox+p.x*s+3,oy+p.y*s+3,s-6,s-6,i?'#4bcaa0':'#9fffe0')});txt('滑动屏幕或使用方向键',W/2,565,16,'center','#7f899f')}};return g},

dodge:()=>{
 const g={score:0,p:{x:430,y:510,w:44,h:44},rocks:[],stars:[],spawn:0,starT:1,lives:3,init(){},update(dt){if(this.dead)return;const speed=410;if(input.l)this.p.x-=speed*dt;if(input.r)this.p.x+=speed*dt;if(input.pointer)this.p.x+=(input.pointer.x-this.p.x-this.p.w/2)*Math.min(1,dt*9);this.p.x=Math.max(20,Math.min(W-20-this.p.w,this.p.x));this.spawn-=dt;if(this.spawn<=0){const r=18+Math.random()*28;this.rocks.push({x:20+Math.random()*(W-40-r*2),y:-r*2,r,vy:180+Math.random()*170+this.score*.012,rot:0});this.spawn=Math.max(.12,.48-this.score/15000)}this.starT-=dt;if(this.starT<=0){this.stars.push({x:30+Math.random()*(W-60),y:-20,vy:180});this.starT=1.4+Math.random()*1.8}for(const o of this.rocks){o.y+=o.vy*dt;o.rot+=dt*2;if(o.y-o.r>H){o.dead=true;this.score+=10}const cx=this.p.x+22,cy=this.p.y+22;if(Math.hypot(cx-o.x,cy-o.y)<o.r+19){o.dead=true;this.lives--;beep(170,.18,'sawtooth',.05);if(this.lives<=0){end('飞船损毁','你被陨石连续命中。');return}}}for(const s of this.stars){s.y+=s.vy*dt;if(Math.hypot(this.p.x+22-s.x,this.p.y+22-s.y)<30){s.dead=true;this.score+=150;beep(900,.05)}if(s.y>H+20)s.dead=true}this.rocks=this.rocks.filter(o=>!o.dead);this.stars=this.stars.filter(s=>!s.dead);this.score+=dt*12;setScore(this.score)},draw(){bg();for(let i=0;i<70;i++){const y=(i*97+performance.now()*.04*(1+i%3))%H;rect((i*137)%W,y,2,2,'#8293b8')}this.stars.forEach(s=>{txt('✦',s.x,s.y,30,'center','#ffd166')});this.rocks.forEach(o=>{X.save();X.translate(o.x,o.y);X.rotate(o.rot);X.fillStyle='#5d6577';X.beginPath();for(let i=0;i<8;i++){const a=i*Math.PI/4,rr=o.r*(.78+((i*17)%5)/18);X.lineTo(Math.cos(a)*rr,Math.sin(a)*rr)}X.closePath();X.fill();X.restore()});X.save();X.translate(this.p.x+22,this.p.y+22);X.fillStyle='#73f7c7';X.beginPath();X.moveTo(0,-24);X.lineTo(20,20);X.lineTo(0,12);X.lineTo(-20,20);X.closePath();X.fill();X.fillStyle='#ff5f7a';X.fillRect(-6,13,12,18);X.restore();txt('护盾 '+ '◆'.repeat(this.lives),18,95,18,'left','#ff8da0')}};return g},

breakout:()=>{
 const g={score:0,p:{x:365,y:550,w:170,h:18},ball:{x:450,y:520,r:10,vx:250,vy:-330,stuck:true},bricks:[],lives:3,init(){this.bricks=[];for(let y=0;y<7;y++)for(let x=0;x<12;x++)this.bricks.push({x:38+x*69,y:90+y*32,w:61,h:23,hp:y<2?2:1})},update(dt){if(this.dead)return;const p=this.p,b=this.ball;if(input.l)p.x-=520*dt;if(input.r)p.x+=520*dt;if(input.pointer)p.x+=(input.pointer.x-p.x-p.w/2)*Math.min(1,dt*12);p.x=Math.max(10,Math.min(W-p.w-10,p.x));if(b.stuck){b.x=p.x+p.w/2;b.y=p.y-14;if(input.pressed){b.stuck=false;input.pressed=false;beep(400,.04)}}else{b.x+=b.vx*dt;b.y+=b.vy*dt;if(b.x<b.r){b.x=b.r;b.vx=Math.abs(b.vx)}if(b.x>W-b.r){b.x=W-b.r;b.vx=-Math.abs(b.vx)}if(b.y<62+b.r){b.y=62+b.r;b.vy=Math.abs(b.vy)}if(b.vy>0&&b.y+b.r>p.y&&b.y-b.r<p.y+p.h&&b.x>p.x&&b.x<p.x+p.w){b.y=p.y-b.r;b.vy=-Math.abs(b.vy)*1.02;b.vx+=(b.x-(p.x+p.w/2))*4;beep(300,.025)}for(const r of this.bricks){if(r.dead)continue;if(b.x+b.r>r.x&&b.x-b.r<r.x+r.w&&b.y+b.r>r.y&&b.y-b.r<r.y+r.h){const px=Math.min(b.x+r.r||b.x,0);b.vy*=-1;r.hp--;this.score+=50;if(r.hp<=0){r.dead=true;this.score+=50}beep(520+r.y,.025);break}}if(b.y>H+30){this.lives--;if(this.lives<=0){end('能量耗尽','球掉出了场地。');return}Object.assign(b,{x:p.x+p.w/2,y:p.y-14,vx:(Math.random()>.5?1:-1)*250,vy:-330,stuck:true})}}this.bricks=this.bricks.filter(r=>!r.dead);if(!this.bricks.length){this.score+=1000;this.init();b.vy*=1.08}setScore(this.score)},draw(){bg();this.bricks.forEach(r=>{rect(r.x,r.y,r.w,r.h,r.hp>1?'#ff5f7a':'#4bcaa0');rect(r.x+4,r.y+4,r.w-8,4,'#ffffff55')});rect(this.p.x,this.p.y,this.p.w,this.p.h,'#ffd166');X.fillStyle='#f4f1e8';X.beginPath();X.arc(this.ball.x,this.ball.y,this.ball.r,0,7);X.fill();txt('剩余球数 '+this.lives,18,95,18,'left','#d7dced');if(this.ball.stuck)txt('点击、空格或“发球”开始',W/2,505,17,'center','#aab3c8')}};return g},

flap:()=>{
