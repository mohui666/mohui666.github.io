<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>余烬之门｜原创回合制小队 RPG</title>
<style>
:root{
  --bg:#0b0d12;--panel:#151922;--panel2:#1d2330;--line:#343d50;--ink:#eee9dc;--muted:#9ca6b8;
  --gold:#d9ad57;--red:#c85f5a;--green:#65a878;--blue:#638cc7;--violet:#9f76c8;--shadow:#0009;
}
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--ink);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,"Noto Sans Mono CJK SC",monospace}
button{font:inherit}
#app{position:relative;width:100%;height:100%;background:radial-gradient(circle at 18% 8%,#232b3d 0,transparent 28%),radial-gradient(circle at 90% 86%,#301e2f 0,transparent 32%),#090b10}
.hidden{display:none!important}
#titleScreen{position:absolute;inset:0;display:grid;place-items:center;padding:24px;overflow:auto}
.titleCard{width:min(760px,96vw);border:1px solid #596277;background:linear-gradient(155deg,#1c2230ee,#10131bee);box-shadow:18px 18px 0 #0008;padding:clamp(26px,5vw,58px)}
.kicker{color:var(--gold);letter-spacing:.18em;font-weight:900;font-size:13px}.title{font-size:clamp(48px,10vw,108px);line-height:.84;letter-spacing:-.08em;margin:14px 0 16px}.subtitle{color:#d4c8ad;font-size:clamp(16px,2vw,24px);font-weight:900}.desc{color:var(--muted);line-height:1.75;margin:22px 0 28px;max-width:650px}
.titleActions{display:flex;gap:12px;flex-wrap:wrap}.btn{border:1px solid #778197;background:#252d3d;color:var(--ink);padding:12px 18px;cursor:pointer;box-shadow:0 4px 0 #080a0f;transition:.12s}.btn:hover{transform:translateY(-2px);border-color:#d7c49c}.btn:active{transform:translateY(2px);box-shadow:0 1px 0 #080a0f}.btn.primary{background:var(--gold);color:#17130c;border-color:#ffe0a0;font-weight:900}.btn.danger{background:#51292e;border-color:#96545c}.tiny{font-size:12px;color:#747f94;margin-top:18px}
#gameScreen{position:absolute;inset:0;display:grid;grid-template-columns:minmax(0,1fr) 330px;grid-template-rows:56px minmax(0,1fr) 150px;gap:1px;background:#2a3140}
#topbar{grid-column:1/3;background:#11151e;display:flex;align-items:center;justify-content:space-between;padding:0 12px;border-bottom:1px solid var(--line);z-index:4}
.brand{font-weight:900;color:#e4d2ad}.chapter{font-size:13px;color:var(--muted)}.topActions{display:flex;gap:8px}.iconBtn{border:1px solid #3d465a;background:#1b2130;color:#ddd;padding:7px 10px;cursor:pointer}
#stage{position:relative;grid-column:1;grid-row:2;background:#07090e;overflow:hidden;min-width:0}
#game{width:100%;height:100%;display:block;touch-action:none;image-rendering:pixelated}
#hint{position:absolute;left:12px;bottom:10px;background:#0a0d14dd;border:1px solid #394259;padding:8px 10px;color:#c9cfda;font-size:12px;pointer-events:none;max-width:70%}
#toast{position:absolute;left:50%;top:18px;transform:translate(-50%,-12px);opacity:0;background:#181f2be8;border:1px solid #59667f;padding:10px 14px;pointer-events:none;transition:.2s;z-index:7}.show{opacity:1!important;transform:translate(-50%,0)!important}
#side{grid-column:2;grid-row:2/4;background:var(--panel);display:flex;flex-direction:column;min-height:0}
.panelHeader{padding:11px 13px;border-bottom:1px solid var(--line);font-weight:900;color:#dfd0b0;display:flex;align-items:center;justify-content:space-between}
#party{padding:10px;display:grid;gap:8px;border-bottom:1px solid var(--line)}
.member{border:1px solid #313a4c;background:#111620;padding:9px;cursor:pointer;display:grid;grid-template-columns:42px 1fr;gap:9px;align-items:center}.member.active{border-color:#d5ad5b;box-shadow:inset 3px 0 #d5ad5b}.portrait{width:42px;height:42px;display:grid;place-items:center;font-size:21px;background:#252c3b;border:1px solid #465168}.mName{font-weight:900}.mMeta{font-size:11px;color:var(--muted);margin-top:3px}.bar{height:6px;background:#090b10;margin-top:6px;border:1px solid #242a37}.bar>i{display:block;height:100%;background:var(--red)}.apbar>i{background:var(--blue)}
#quest{padding:12px;border-bottom:1px solid var(--line);font-size:12px;line-height:1.55;color:#bdc5d3}.questTitle{font-weight:900;color:#e2c98e;margin-bottom:5px}
#log{padding:10px;overflow:auto;flex:1;font-size:11px;line-height:1.55;background:#10141c;color:#aeb7c8}.logLine{margin-bottom:5px}.good{color:#7fc694}.bad{color:#e0837d}.gold{color:#e0bb70}.violet{color:#b58ad7}
#bottom{grid-column:1;grid-row:3;background:#11151e;border-top:1px solid var(--line);display:grid;grid-template-columns:220px minmax(0,1fr) 170px;gap:1px;min-width:0}
#unitInfo{background:#151a24;padding:12px;overflow:auto}.unitTitle{font-weight:900;font-size:17px}.unitDesc{font-size:11px;color:var(--muted);line-height:1.45;margin-top:5px}.statsRow{display:flex;gap:10px;font-size:11px;margin-top:9px;color:#c6cbd5}
#skills{background:#131822;display:flex;gap:8px;padding:10px;overflow-x:auto;align-items:stretch}.skill{position:relative;min-width:112px;max-width:145px;border:1px solid #3a4458;background:#202735;color:#eee;padding:10px;text-align:left;cursor:pointer}.skill:hover{border-color:#d2b572}.skill.active{outline:2px solid #e1b85e}.skill.disabled{opacity:.35;cursor:not-allowed}.skillKey{position:absolute;right:7px;top:6px;color:#909aaf;font-size:10px}.skillName{font-weight:900;font-size:13px}.skillDesc{font-size:10px;color:#aeb7c8;line-height:1.4;margin-top:6px}.cost{font-size:10px;color:#7fabe0;margin-top:7px}
#turnBox{background:#181e29;padding:10px;display:flex;flex-direction:column;gap:8px;justify-content:center}.turnBtn{border:1px solid #6d5a35;background:#c49548;color:#17120b;padding:12px;font-weight:900;cursor:pointer}.turnBtn:disabled{opacity:.4}.smallBtn{border:1px solid #414b60;background:#242b3b;color:#e5e7ec;padding:9px;cursor:pointer}
.overlay{position:absolute;inset:0;z-index:20;background:#05070bcc;display:grid;place-items:center;padding:18px}.modal{width:min(720px,96vw);max-height:90vh;overflow:auto;background:#151a24;border:1px solid #606b81;box-shadow:15px 15px 0 #0008;padding:24px}.modal h2{font-size:30px;margin:0 0 8px}.modal p{color:#b5bdca;line-height:1.65}.choices{display:grid;gap:9px;margin-top:18px}.choice{border:1px solid #414b61;background:#202735;color:#eee;padding:13px;text-align:left;cursor:pointer}.choice:hover{border-color:#d7b86e;background:#282f3e}.choice strong{color:#e3c47e}.choice small{display:block;color:#9da7b8;margin-top:4px}.inventoryGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin-top:16px}.item{border:1px solid #3c465a;background:#1d2330;padding:12px}.item h3{font-size:14px;margin:0 0 6px}.item p{font-size:11px;margin:0 0 9px}.item button{width:100%;border:1px solid #60708b;background:#2c3548;color:#fff;padding:8px;cursor:pointer}.modalActions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
@media(max-width:900px){#gameScreen{grid-template-columns:minmax(0,1fr);grid-template-rows:48px minmax(0,1fr) 160px}#topbar{grid-column:1;grid-row:1}.chapter{display:none}.brand{font-size:13px}#stage{grid-column:1;grid-row:2}#side{position:absolute;right:0;top:48px;bottom:160px;width:min(330px,88vw);z-index:12;transform:translateX(100%);transition:.2s;border-left:1px solid var(--line)}#side.open{transform:translateX(0)}#bottom{grid-column:1;grid-row:3;grid-template-columns:150px minmax(0,1fr) 110px}#unitInfo{padding:8px}.unitDesc{display:none}.statsRow{gap:5px;font-size:10px}.skill{min-width:95px;padding:8px}.skillDesc{display:none}}
@media(max-width:560px){#bottom{grid-template-columns:115px minmax(0,1fr) 92px}.unitTitle{font-size:13px}.statsRow{display:grid;gap:2px}.turnBox{padding:6px}.turnBtn,.smallBtn{padding:8px 5px;font-size:11px}.skill{min-width:82px}.skillName{font-size:11px}.cost{font-size:9px}.topActions .iconBtn:nth-child(2){display:none}}
</style>
</head>
<body>
<div id="app">
  <section id="titleScreen">
    <div class="titleCard">
      <div class="kicker">ORIGINAL BROWSER CRPG</div>
      <h1 class="title">余烬<br>之门</h1>
      <div class="subtitle">小队回合制角色扮演</div>
      <p class="desc">组建三人小队，在破碎边境中探索、交涉与战斗。包含对话选择、属性检定、行动点、地形、技能、状态效果、战利品、营地休整与本地存档。所有美术与剧情均为原创程序化内容。</p>
      <div class="titleActions"><button class="btn primary" id="newGame">开始新旅程</button><button class="btn" id="continueGame">继续存档</button><button class="btn" onclick="location.href='../'">返回街机厅</button></div>
      <div class="tiny">操作：点击角色与格子；数字键 1–4 选择技能；空格结束回合。手机可直接触控。</div>
    </div>
  </section>
  <section id="gameScreen" class="hidden">
    <header id="topbar"><div><span class="brand">余烬之门</span> <span class="chapter" id="chapterText"></span></div><div class="topActions"><button class="iconBtn" id="inventoryBtn">背包</button><button class="iconBtn" id="saveBtn">保存</button><button class="iconBtn" id="panelBtn">队伍/日志</button><button class="iconBtn" onclick="location.href='../'">退出</button></div></header>
    <main id="stage"><canvas id="game" width="1100" height="700" aria-label="余烬之门战术地图"></canvas><div id="hint">选择角色，然后点击蓝色格子移动；选择技能后点击目标。</div><div id="toast"></div></main>
    <aside id="side"><div class="panelHeader">队伍 <span id="roundText">回合 1</span></div><div id="party"></div><div id="quest"></div><div class="panelHeader">战斗记录</div><div id="log"></div></aside>
    <footer id="bottom"><div id="unitInfo"></div><div id="skills"></div><div id="turnBox"><button class="turnBtn" id="endTurn">结束回合</button><button class="smallBtn" id="restBtn">短休</button></div></footer>
    <div id="dialogue" class="overlay hidden"><div class="modal"><div class="kicker" id="speaker">陌生人</div><h2 id="dialogueTitle"></h2><p id="dialogueText"></p><div class="choices" id="choices"></div></div></div>
    <div id="inventory" class="overlay hidden"><div class="modal"><h2>队伍背包</h2><p>消耗品会由当前选中的角色使用；装备提供常驻属性。</p><div class="inventoryGrid" id="inventoryGrid"></div><div class="modalActions"><button class="btn" id="closeInventory">关闭</button></div></div></div>
    <div id="result" class="overlay hidden"><div class="modal"><div class="kicker" id="resultKicker">遭遇结束</div><h2 id="resultTitle"></h2><p id="resultText"></p><div class="modalActions"><button class="btn primary" id="resultNext">继续</button><button class="btn" onclick="location.href='../'">返回街机厅</button></div></div></div>
  </section>
</div>
<script>
(()=>{
'use strict';
const $=s=>document.querySelector(s), C=$('#game'), X=C.getContext('2d');
const W=C.width,H=C.height,TILE=64,COLS=14,ROWS=8,OX=90,OY=92;
const ui={title:$('#titleScreen'),game:$('#gameScreen'),party:$('#party'),quest:$('#quest'),log:$('#log'),unit:$('#unitInfo'),skills:$('#skills'),round:$('#roundText'),chapter:$('#chapterText'),hint:$('#hint'),toast:$('#toast'),side:$('#side'),dialogue:$('#dialogue'),speaker:$('#speaker'),dialogueTitle:$('#dialogueTitle'),dialogueText:$('#dialogueText'),choices:$('#choices'),inventory:$('#inventory'),inventoryGrid:$('#inventoryGrid'),result:$('#result'),resultKicker:$('#resultKicker'),resultTitle:$('#resultTitle'),resultText:$('#resultText'),resultNext:$('#resultNext')};
let audio=null, game=null, pointer={x:0,y:0}, toastTimer=0;
function beep(f=440,d=.05,type='square',vol=.025){try{audio||=new(window.AudioContext||window.webkitAudioContext)();const o=audio.createOscillator(),g=audio.createGain();o.type=type;o.frequency.value=f;g.gain.value=vol;g.gain.exponentialRampToValueAtTime(.0001,audio.currentTime+d);o.connect(g).connect(audio.destination);o.start();o.stop(audio.currentTime+d)}catch(e){}}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function roll(n=20){return 1+Math.floor(Math.random()*n)}function key(x,y){return `${x},${y}`}function manhattan(a,b){return Math.abs(a.x-b.x)+Math.abs(a.y-b.y)}function fmt(n){return Math.max(0,Math.floor(n))}
function showToast(t){ui.toast.textContent=t;ui.toast.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>ui.toast.classList.remove('show'),1500)}
function log(text,cls=''){if(!game)return;game.logs.push({text,cls});if(game.logs.length>100)game.logs.shift();renderLog()}function renderLog(){ui.log.innerHTML=game.logs.slice().reverse().map(l=>`<div class="logLine ${l.cls}">${l.text}</div>`).join('')}
function saveGame(){if(!game)return;const data={chapter:game.chapter,party:game.party.map(u=>serializeUnit(u)),inventory:game.inventory,flags:game.flags,gold:game.gold};localStorage.setItem('emberGateSave',JSON.stringify(data));showToast('存档已写入本机');beep(680,.04)}
function loadGame(){try{return JSON.parse(localStorage.getItem('emberGateSave')||'null')}catch(e){return null}}
function serializeUnit(u){return {id:u.id,name:u.name,role:u.role,level:u.level,x:u.x,y:u.y,hp:u.hp,maxHp:u.maxHp,ac:u.ac,move:u.move,attack:u.attack,power:u.power,range:u.range,color:u.color,icon:u.icon,skills:u.skills,dead:false,status:{},xp:u.xp||0}}
const SKILLS={basic:{name:'普通攻击',ap:2,range:1,desc:'近战武器攻击。',target:'enemy',kind:'attack',damage:[1,8],stat:'attack'},slash:{name:'裂甲斩',ap:3,range:1,desc:'造成伤害并降低护甲。',target:'enemy',kind:'attack',damage:[1,10],stat:'attack',effect:'shred'},guard:{name:'守势',ap:2,range:0,desc:'获得 4 点临时护甲。',target:'self',kind:'buff',effect:'guard'},cleave:{name:'横扫',ap:4,range:1,desc:'攻击目标及相邻敌人。',target:'enemy',kind:'aoeMelee',damage:[1,7],stat:'attack'},shot:{name:'长弓射击',ap:2,range:6,desc:'远程武器攻击。',target:'enemy',kind:'attack',damage:[1,8],stat:'attack'},pin:{name:'钉足箭',ap:3,range:6,desc:'造成伤害并使目标减速。',target:'enemy',kind:'attack',damage:[1,6],stat:'attack',effect:'slow'},volley:{name:'箭雨',ap:4,range:5,desc:'轰击目标周围一格。',target:'tile',kind:'aoe',damage:[1,6],stat:'attack',radius:1},dash:{name:'疾步',ap:1,range:0,desc:'本回合额外获得 3 点行动力。',target:'self',kind:'buff',effect:'dash'},bolt:{name:'寒霜箭',ap:2,range:5,desc:'法术攻击并冻结目标。',target:'enemy',kind:'attack',damage:[1,8],stat:'power',effect:'freeze'},fireball:{name:'火球术',ap:4,range:5,desc:'目标周围一格爆炸并燃烧。',target:'tile',kind:'aoe',damage:[2,6],stat:'power',radius:1,effect:'burn'},mend:{name:'愈合术',ap:3,range:4,desc:'治疗一名队友。',target:'ally',kind:'heal',heal:[2,6],stat:'power'},blink:{name:'闪现',ap:2,range:4,desc:'瞬移到可见空格。',target:'tile',kind:'teleport'},bite:{name:'撕咬',ap:2,range:1,desc:'野兽攻击。',target:'enemy',kind:'attack',damage:[1,7],stat:'attack'},darkbolt:{name:'暗影弹',ap:3,range:5,desc:'远程法术攻击。',target:'enemy',kind:'attack',damage:[1,9],stat:'power'},howl:{name:'恐惧嚎叫',ap:4,range:3,desc:'削弱附近敌人的命中。',target:'self',kind:'enemyHowl'},bossfire:{name:'余烬爆裂',ap:4,range:6,desc:'大范围火焰攻击。',target:'tile',kind:'aoe',damage:[2,8],stat:'power',radius:2,effect:'burn'}};
function makeHero(id,name,role,x,y){const base={id,name,role,team:'hero',x,y,level:1,ap:6,maxAp:6,dead:false,status:{},xp:0};if(role==='守卫')return {...base,icon:'◆',color:'#c99161',maxHp:38,hp:38,ac:14,move:5,attack:5,power:1,range:1,skills:['basic','slash','guard','cleave']};if(role==='游侠')return {...base,icon:'▲',color:'#72aa7d',maxHp:28,hp:28,ac:13,move:6,attack:6,power:1,range:6,skills:['shot','pin','volley','dash']};return {...base,icon:'✦',color:'#7d79bd',maxHp:24,hp:24,ac:12,move:5,attack:2,power:7,range:5,skills:['bolt','fireball','mend','blink']}}
function makeEnemy(type,id,x,y){const base={id,name:type,role:type,team:'enemy',x,y,level:1,ap:6,maxAp:6,dead:false,status:{},xp:0,ai:true};if(type==='灰狼')return {...base,icon:'◇',color:'#9299a5',maxHp:18,hp:18,ac:12,move:7,attack:4,power:0,range:1,skills:['bite']};if(type==='余烬教徒')return {...base,icon:'●',color:'#b45c58',maxHp:22,hp:22,ac:12,move:5,attack:4,power:3,range:4,skills:['basic','darkbolt']};if(type==='低语祭司')return {...base,icon:'✹',color:'#9c6fb5',maxHp:30,hp:30,ac:13,move:4,attack:3,power:6,range:5,skills:['darkbolt','howl']};return {...base,name:'焚心守卫',role:'首领',icon:'⬢',color:'#d05f42',maxHp:72,hp:72,ac:15,move:5,attack:7,power:8,range:6,skills:['slash','bossfire','howl']}}
const CHAPTERS=[{name:'第一章：断桥哨站',quest:'击败占据哨站的余烬教徒。',terrain:['##############','#............#','#..##........#','#......#.....#','#......#.....#','#...##.......#','#............#','##############'],heroes:[[2,5],[2,4],[2,3]],enemies:[['灰狼',10,2],['余烬教徒',10,5],['余烬教徒',11,4]],dialogue:'outpost'},{name:'第二章：低语石窟',quest:'穿过石窟，击败低语祭司。',terrain:['##############','#....#.......#','#....#..##...#','#............#','#..###.......#','#.........#..#','#............#','##############'],heroes:[[1,5],[1,4],[1,3]],enemies:[['灰狼',9,2],['灰狼',10,5],['余烬教徒',11,3],['低语祭司',11,5]],dialogue:'cave'},{name:'第三章：余烬之门',quest:'击败焚心守卫，关闭余烬之门。',terrain:['##############','#............#','#..##....##..#','#............#','#.....##.....#','#............#','#............#','##############'],heroes:[[2,5],[2,4],[2,3]],enemies:[['余烬教徒',10,2],['余烬教徒',10,5],['低语祭司',11,4],['焚心守卫',9,4]],dialogue:'gate'}];
const DIALOGUES={outpost:{speaker:'哨站幸存者',title:'桥上的烟',text:'“他们把俘虏锁在塔下。正面冲进去会惊动所有人。你们打算怎么办？”',choices:[{label:'[威吓] 高声宣战，动摇守军。',check:'attack',dc:12,success:'敌人初始生命降低 20%。',fail:'敌人获得警戒，首轮护甲 +1。',flag:'intimidate'},{label:'[洞察] 观察哨站巡逻规律。',check:'power',dc:11,success:'发现侧翼路线，全队首轮行动力 +2。',fail:'没有发现明显破绽。',flag:'insight'},{label:'直接进攻。',success:'保持完整资源进入战斗。',flag:'direct'}]},cave:{speaker:'被困的矿工',title:'石壁后的呢喃',text:'“祭司在用黑曜石增幅法术。打碎它，或许能削弱她。”',choices:[{label:'[奥秘] 逆转黑曜石符文。',check:'power',dc:13,success:'祭司法术能力降低 2。',fail:'符文反噬，法师失去 4 点生命。',flag:'rune'},{label:'[敏捷] 绕过陷阱破坏石柱。',check:'attack',dc:12,success:'战场上的两处岩柱变为可通行。',fail:'游侠触发陷阱，失去 4 点生命。',flag:'pillar'},{label:'保持谨慎，直接进入石窟。',success:'没有额外变化。',flag:'direct'}]},gate:{speaker:'焚心守卫',title:'门后的火',text:'“凡人，你们的名字会在火中被遗忘。跪下，或成为门的燃料。”',choices:[{label:'[意志] 拒绝恐惧，鼓舞同伴。',check:'power',dc:14,success:'全队获得 6 点临时生命。',fail:'全队首轮命中 -1。',flag:'resolve'},{label:'[战术] 挑衅首领离开法阵。',check:'attack',dc:14,success:'首领初始护甲降低 2。',fail:'首领获得 8 点临时生命。',flag:'taunt'},{label:'拔出武器。',success:'最终战立即开始。',flag:'direct'}]}};
function newGame(saved=null){const party=saved?.party?.map(u=>({...u,team:'hero',ap:6,maxAp:6,status:{},dead:false}))||[makeHero('arden','阿登','守卫',2,5),makeHero('lyra','莱拉','游侠',2,4),makeHero('mira','米拉','秘法师',2,3)];game={chapter:saved?.chapter||0,party,enemies:[],units:[],selected:null,skill:null,round:1,phase:'hero',logs:[],inventory:saved?.inventory||[{id:'potion',name:'治疗药水',count:3,desc:'恢复 12 点生命。'},{id:'bomb',name:'炼金火瓶',count:1,desc:'对相邻敌人造成 8 点伤害。'},{id:'amulet',name:'铁誓护符',count:1,desc:'装备：全队护甲 +1。',equipped:false}],flags:saved?.flags||{},gold:saved?.gold||42,moving:null,particles:[],shake:0,objectiveDone:false};ui.title.classList.add('hidden');ui.game.classList.remove('hidden');loadChapter(game.chapter,true)}
function loadChapter(index,showDialogue=true){game.chapter=index;const ch=CHAPTERS[index];game.map=ch.terrain.map(r=>r.split(''));game.enemies=ch.enemies.map((e,i)=>makeEnemy(e[0],`e${index}_${i}`,e[1],e[2]));game.party.forEach((u,i)=>{u.x=ch.heroes[i][0];u.y=ch.heroes[i][1];u.ap=u.maxAp;u.status={};u.dead=false;u.hp=Math.max(1,u.hp)});game.units=[...game.party,...game.enemies];game.selected=game.party.find(u=>!u.dead)||null;game.skill=null;game.phase='hero';game.round=1;game.objectiveDone=false;game.logs=[];ui.chapter.textContent=ch.name;ui.round.textContent='回合 1';applyEquipment();updateAllUI();log(`进入 ${ch.name}`,'gold');if(showDialogue)showDialogueFor(ch.dialogue)}
function applyEquipment(){const amulet=game.inventory.find(i=>i.id==='amulet'&&i.equipped);game.party.forEach(u=>u.tempAc=amulet?1:0)}
function showDialogueFor(id){const d=DIALOGUES[id];ui.speaker.textContent=d.speaker;ui.dialogueTitle.textContent=d.title;ui.dialogueText.textContent=d.text;ui.choices.innerHTML='';d.choices.forEach(c=>{const b=document.createElement('button');b.className='choice';b.innerHTML=`<strong>${c.label}</strong><small>${c.success}</small>`;b.onclick=()=>resolveChoice(c);ui.choices.appendChild(b)});ui.dialogue.classList.remove('hidden')}
function resolveChoice(c){let ok=true,detail='';if(c.check){const hero=c.check==='power'?game.party[2]:game.party[0];const stat=hero[c.check]||0,r=roll(20),total=r+stat;ok=total>=c.dc;detail=`检定 d20(${r}) + ${stat} = ${total}，难度 ${c.dc}`;log(`${detail}：${ok?'成功':'失败'}`,ok?'good':'bad')}applyChoice(c.flag,ok);ui.dialogue.classList.add('hidden');showToast(ok?c.success:c.fail||c.success);updateAllUI()}
function applyChoice(flag,ok){game.flags[`${game.chapter}_${flag}`]=ok;if(game.chapter===0){if(flag==='intimidate'&&ok)game.enemies.forEach(e=>e.hp=Math.ceil(e.maxHp*.8));if(flag==='intimidate'&&!ok)game.enemies.forEach(e=>e.tempAc=1);if(flag==='insight'&&ok)game.party.forEach(u=>u.ap+=2)}if(game.chapter===1){if(flag==='rune'&&ok){const p=game.enemies.find(e=>e.role==='低语祭司');if(p)p.power-=2}else if(flag==='rune'&&!ok)game.party[2].hp-=4;if(flag==='pillar'&&ok){game.map[2][8]='.';game.map[2][9]='.'}else if(flag==='pillar'&&!ok)game.party[1].hp-=4}if(game.chapter===2){if(flag==='resolve'&&ok)game.party.forEach(u=>u.status.tempHp=6);else if(flag==='resolve'&&!ok)game.party.forEach(u=>u.status.shaken=1);const boss=game.enemies.find(e=>e.role==='首领');if(flag==='taunt'&&boss){if(ok)boss.tempAc=-2;else boss.status.tempHp=8}}}
function alive(team){return game.units.filter(u=>u.team===team&&!u.dead&&u.hp>0)}function unitAt(x,y){return game.units.find(u=>!u.dead&&u.x===x&&u.y===y)}function walkable(x,y,ignoreUnit=null){return x>=0&&y>=0&&x<COLS&&y<ROWS&&game.map[y][x]!== '#'&&(!unitAt(x,y)||unitAt(x,y)===ignoreUnit)}function neighbors(n){return [[1,0],[-1,0],[0,1],[0,-1]].map(d=>({x:n.x+d[0],y:n.y+d[1]})).filter(p=>walkable(p.x,p.y))}
function findPath(start,end,unit){const q=[start],came=new Map(),seen=new Set([key(start.x,start.y)]);while(q.length){const c=q.shift();if(c.x===end.x&&c.y===end.y){const path=[];let k=key(c.x,c.y),cur=c;while(!(cur.x===start.x&&cur.y===start.y)){path.unshift(cur);cur=came.get(k);k=key(cur.x,cur.y)}return path}for(const n of neighbors(c)){if(unitAt(n.x,n.y)&&!(n.x===end.x&&n.y===end.y))continue;const k=key(n.x,n.y);if(!seen.has(k)){seen.add(k);came.set(k,c);q.push(n)}}}return null}
function reachable(unit){const max=unit.ap;const q=[{x:unit.x,y:unit.y,c:0}],out=new Map([[key(unit.x,unit.y),0]]);while(q.length){const c=q.shift();for(const n of neighbors(c)){if(unitAt(n.x,n.y))continue;const nc=c.c+1,k=key(n.x,n.y);if(nc<=max&&(!out.has(k)||nc<out.get(k))){out.set(k,nc);q.push({...n,c:nc})}}}return out}
function los(a,b){let x0=a.x,y0=a.y,x1=b.x,y1=b.y,dx=Math.abs(x1-x0),dy=-Math.abs(y1-y0),sx=x0<x1?1:-1,sy=y0<y1?1:-1,err=dx+dy;while(true){if(x0===x1&&y0===y1)return true;if(!(x0===a.x&&y0===a.y)&&game.map[y0]?.[x0]==='#')return false;const e2=2*err;if(e2>=dy){err+=dy;x0+=sx}if(e2<=dx){err+=dx;y0+=sy}}}
function rangeOK(caster,target,skill){return manhattan(caster,target)<=skill.range&&los(caster,target)}function damageRoll(d){let total=0;for(let i=0;i<d[0];i++)total+=roll(d[1]);return total}
function applyDamage(target,amount,source=''){let dmg=amount;if(target.status.guard){const absorb=Math.min(target.status.guard,dmg);target.status.guard-=absorb;dmg-=absorb}if(target.status.tempHp){const absorb=Math.min(target.status.tempHp,dmg);target.status.tempHp-=absorb;dmg-=absorb}target.hp-=dmg;game.shake=8;game.particles.push({x:target.x,y:target.y,text:`-${dmg}`,life:1,color:'#e8867d'});if(dmg>0)beep(170,.06,'sawtooth',.035);if(target.hp<=0){target.hp=0;target.dead=true;log(`${target.name} 倒下了。`,target.team==='enemy'?'good':'bad');beep(100,.18,'sawtooth',.04)}return dmg}
function healUnit(target,amount){const old=target.hp;target.hp=Math.min(target.maxHp,target.hp+amount);const h=target.hp-old;game.particles.push({x:target.x,y:target.y,text:`+${h}`,life:1,color:'#80d595'});beep(700,.08,'sine',.03);return h}
function attackRoll(caster,target,skill){const stat=caster[skill.stat]||0,pen=target.status.shred?2:0,shake=caster.status.shaken?-1:0,r=roll(20),total=r+stat+shake,ac=target.ac+(target.tempAc||0)-pen;const crit=r===20,hit=crit||total>=ac;log(`${caster.name} 使用 ${skill.name}：d20(${r}) + ${stat+shake} 对抗 AC ${ac} → ${hit?'命中':'未命中'}`,hit?'good':'bad');return {hit,crit}}
function useSkill(caster,skillId,target){const s=SKILLS[skillId];if(!s||caster.dead||game.phase!=='hero'&&caster.team==='hero')return false;if(caster.ap<s.ap){showToast('行动力不足');return false}if(s.target==='self'){caster.ap-=s.ap;if(s.effect==='guard')caster.status.guard=(caster.status.guard||0)+4;if(s.effect==='dash')caster.ap+=3;if(s.kind==='enemyHowl'){alive(caster.team==='hero'?'enemy':'hero').filter(u=>manhattan(caster,u)<=3).forEach(u=>u.status.shaken=2)}log(`${caster.name} 使用 ${s.name}`,'violet');afterAction(caster);return true}if(s.kind==='teleport'){if(!target||!walkable(target.x,target.y)||manhattan(caster,target)>s.range){showToast('无法闪现到该位置');return false}caster.ap-=s.ap;caster.x=target.x;caster.y=target.y;game.particles.push({x:caster.x,y:caster.y,text:'闪现',life:1,color:'#b98bdf'});afterAction(caster);return true}if(s.kind==='heal'){if(!target||target.team!==caster.team||target.dead||!rangeOK(caster,target,s)){showToast('治疗目标无效');return false}caster.ap-=s.ap;const h=damageRoll(s.heal)+(caster[s.stat]||0);healUnit(target,h);log(`${caster.name} 治疗 ${target.name} ${h} 点生命。`,'good');afterAction(caster);return true}if(s.kind==='aoe'||s.kind==='aoeMelee'){if(!target||manhattan(caster,target)>s.range||!los(caster,target)){showToast('目标位置超出范围');return false}caster.ap-=s.ap;const targets=alive(caster.team==='hero'?'enemy':'hero').filter(u=>manhattan(u,target)<=s.radius||s.kind==='aoeMelee'&&(u===target||manhattan(u,target)<=1));targets.forEach(t=>{const check=attackRoll(caster,t,s);if(check.hit){const dmg=damageRoll(s.damage)+(caster[s.stat]||0)+(check.crit?damageRoll(s.damage):0);applyDamage(t,dmg,caster.name);if(s.effect)t.status[s.effect]=2}});log(`${caster.name} 施放 ${s.name}，影响 ${targets.length} 个目标。`,'violet');afterAction(caster);return true}if(!target||target.team===caster.team||target.dead||!rangeOK(caster,target,s)){showToast('攻击目标无效');return false}caster.ap-=s.ap;const check=attackRoll(caster,target,s);if(check.hit){let dmg=damageRoll(s.damage)+(caster[s.stat]||0);if(check.crit)dmg+=damageRoll(s.damage);applyDamage(target,dmg,caster.name);if(s.effect)target.status[s.effect]=2;log(`${target.name} 受到 ${dmg} 点伤害。`,'good')}afterAction(caster);return true}
function afterAction(caster){game.skill=null;tickDeaths();updateAllUI();if(caster.team==='hero'&&alive('hero').every(u=>u.ap<=0))endHeroTurn();checkVictory()}function tickDeaths(){game.units.forEach(u=>{if(u.hp<=0)u.dead=true})}
function selectUnit(u){if(!u||u.dead)return;if(game.phase==='hero'&&u.team==='hero'){game.selected=u;game.skill=null;updateAllUI()}else if(u.team==='enemy')showToast(`${u.name}：HP ${u.hp}/${u.maxHp}，AC ${u.ac+(u.tempAc||0)}`)}
function moveSelected(x,y){const u=game.selected;if(!u||u.dead||u.team!=='hero'||game.phase!=='hero')return;const p=findPath({x:u.x,y:u.y},{x,y},u);if(!p||p.length>u.ap){showToast('该位置不可达');return}u.ap-=p.length;game.moving={unit:u,path:p,index:0,t:0};game.skill=null;log(`${u.name} 移动 ${p.length} 格。`);updateAllUI()}
function checkVictory(){if(!alive('hero').length){showResult('远征失败','小队在余烬边境全军覆没。可以从最近存档继续。',false);return}if(!alive('enemy').length&&!game.objectiveDone){game.objectiveDone=true;game.gold+=30+game.chapter*20;game.inventory.find(i=>i.id==='potion').count+=1;showResult('遭遇胜利',`你们清除了此地的威胁，获得 ${30+game.chapter*20} 金币与 1 瓶治疗药水。`,true)}}
function showResult(title,text,win){ui.resultKicker.textContent=win?'遭遇结束':'旅程中断';ui.resultTitle.textContent=title;ui.resultText.textContent=text;ui.resultNext.textContent=win?(game.chapter<CHAPTERS.length-1?'前往下一章':'完成远征'):'读取存档';ui.resultNext.onclick=()=>{ui.result.classList.add('hidden');if(win){if(game.chapter<CHAPTERS.length-1){game.chapter++;game.party.forEach(u=>u.hp=Math.min(u.maxHp,u.hp+10));saveGame();loadChapter(game.chapter,true)}else{localStorage.removeItem('emberGateSave');ui.result.classList.remove('hidden');ui.resultKicker.textContent='终章';ui.resultTitle.textContent='余烬之门已关闭';ui.resultText.textContent='边境重新看见了清晨。你的选择与小队配置决定了这场远征的代价。';ui.resultNext.textContent='返回标题';ui.resultNext.onclick=()=>location.reload()}}else{const s=loadGame();if(s)newGame(s);else location.reload()}};ui.result.classList.remove('hidden')}
async function endHeroTurn(){if(game.phase!=='hero')return;game.phase='enemy';game.skill=null;ui.hint.textContent='敌方正在行动……';updateAllUI();await delay(300);for(const e of alive('enemy')){e.ap=e.maxAp;tickStatus(e);await enemyAct(e);if(!alive('hero').length)break}startHeroRound()}
function startHeroRound(){if(!alive('hero').length)return;game.round++;game.phase='hero';alive('hero').forEach(u=>{u.ap=u.maxAp;tickStatus(u)});game.selected=alive('hero')[0];ui.round.textContent=`回合 ${game.round}`;ui.hint.textContent='选择角色，然后点击蓝色格子移动；选择技能后点击目标。';updateAllUI();checkVictory()}
function tickStatus(u){if(u.status.burn){applyDamage(u,3,'燃烧');u.status.burn--;log(`${u.name} 受到燃烧伤害。`,'bad')}if(u.status.freeze){u.ap=Math.max(0,u.ap-2);u.status.freeze--}if(u.status.slow){u.ap=Math.max(0,u.ap-1);u.status.slow--}if(u.status.shred)u.status.shred--;if(u.status.shaken)u.status.shaken--;if(u.status.guard)u.status.guard=0}
function delay(ms){return new Promise(r=>setTimeout(r,ms))}
async function enemyAct(e){if(e.dead)return;let loops=0;while(e.ap>=2&&loops++<3&&!e.dead){const targets=alive('hero').sort((a,b)=>manhattan(e,a)-manhattan(e,b));if(!targets.length)return;let target=targets[0];let skillId=e.skills.find(id=>{const s=SKILLS[id];return s.target==='enemy'&&e.ap>=s.ap&&rangeOK(e,target,s)})||null;if(!skillId&&e.skills.includes('bossfire')&&e.ap>=4&&manhattan(e,target)<=6)skillId='bossfire';if(!skillId){const dest=bestStepToward(e,target);if(dest){e.x=dest.x;e.y=dest.y;e.ap--;await delay(120)}else break}else{const s=SKILLS[skillId];useSkill(e,skillId,s.target==='tile'?{x:target.x,y:target.y}:target);await delay(280)}}}
function bestStepToward(e,t){const opts=neighbors(e).filter(p=>!unitAt(p.x,p.y));opts.sort((a,b)=>manhattan(a,t)-manhattan(b,t));return opts[0]||null}
function renderParty(){ui.party.innerHTML=game.party.map(u=>`<div class="member ${game.selected===u?'active':''}" data-id="${u.id}"><div class="portrait" style="color:${u.color}">${u.icon}</div><div><div class="mName">${u.name} · ${u.role}</div><div class="mMeta">HP ${fmt(u.hp)}/${u.maxHp}　AP ${u.ap}/${u.maxAp}${u.dead?'　[倒下]':''}</div><div class="bar"><i style="width:${100*u.hp/u.maxHp}%"></i></div><div class="bar apbar"><i style="width:${100*u.ap/u.maxAp}%"></i></div></div></div>`).join('');ui.party.querySelectorAll('.member').forEach(el=>el.onclick=()=>selectUnit(game.party.find(u=>u.id===el.dataset.id)))}
function renderQuest(){const ch=CHAPTERS[game.chapter];ui.quest.innerHTML=`<div class="questTitle">当前目标</div>${ch.quest}<br><br><span class="gold">金币 ${game.gold}</span>　敌人 ${alive('enemy').length}`}
function renderUnit(){const u=game.selected;if(!u){ui.unit.innerHTML='';return}const status=Object.entries(u.status).filter(([,v])=>v).map(([k])=>({burn:'燃烧',freeze:'冻结',slow:'减速',guard:'临时护甲',tempHp:'临时生命',shred:'破甲',shaken:'动摇'}[k]||k)).join('、')||'无';ui.unit.innerHTML=`<div class="unitTitle">${u.name}</div><div class="unitDesc">${u.role} · 等级 ${u.level}<br>状态：${status}</div><div class="statsRow"><span>HP ${fmt(u.hp)}/${u.maxHp}</span><span>AC ${u.ac+(u.tempAc||0)}</span><span>AP ${u.ap}</span><span>攻 ${u.attack}</span><span>法 ${u.power}</span></div>`}
function renderSkills(){const u=game.selected;if(!u||u.dead||u.team!=='hero'){ui.skills.innerHTML='';return}ui.skills.innerHTML=u.skills.map((id,i)=>{const s=SKILLS[id],disabled=u.ap<s.ap||game.phase!=='hero';return `<button class="skill ${game.skill===id?'active':''} ${disabled?'disabled':''}" data-id="${id}"><span class="skillKey">${i+1}</span><div class="skillName">${s.name}</div><div class="skillDesc">${s.desc}</div><div class="cost">AP ${s.ap} · 距离 ${s.range}</div></button>`}).join('');ui.skills.querySelectorAll('.skill').forEach(b=>b.onclick=()=>{const s=SKILLS[b.dataset.id];if(game.selected.ap<s.ap||game.phase!=='hero')return;if(s.target==='self'){useSkill(game.selected,b.dataset.id,game.selected)}else{game.skill=b.dataset.id;updateAllUI();showToast(`已选择：${s.name}`)}})}
function updateAllUI(){if(!game)return;renderParty();renderQuest();renderUnit();renderSkills();renderLog();$('#endTurn').disabled=game.phase!=='hero';$('#restBtn').disabled=game.phase!=='hero'}
function renderInventory(){ui.inventoryGrid.innerHTML=game.inventory.map((it,idx)=>`<div class="item"><h3>${it.name} × ${it.count}</h3><p>${it.desc}</p><button data-i="${idx}" ${it.count<=0?'disabled':''}>${it.id==='amulet'?(it.equipped?'卸下':'装备'):'使用'}</button></div>`).join('');ui.inventoryGrid.querySelectorAll('button').forEach(b=>b.onclick=()=>useItem(+b.dataset.i))}
function useItem(i){const it=game.inventory[i],u=game.selected;if(!u)return;if(it.id==='potion'&&it.count>0){healUnit(u,12);it.count--;log(`${u.name} 使用治疗药水。`,'good')}else if(it.id==='bomb'&&it.count>0){alive('enemy').filter(e=>manhattan(e,u)<=2).forEach(e=>applyDamage(e,8,u.name));it.count--;log(`${u.name} 投掷炼金火瓶。`,'gold');checkVictory()}else if(it.id==='amulet'){it.equipped=!it.equipped;applyEquipment()}renderInventory();updateAllUI()}
function tileFromPointer(px,py){const r=C.getBoundingClientRect(),sx=C.width/r.width,sy=C.height/r.height;const x=(px-r.left)*sx,y=(py-r.top)*sy;return {x:Math.floor((x-OX)/TILE),y:Math.floor((y-OY)/TILE),cx:x,cy:y}}
C.addEventListener('pointermove',e=>{pointer=tileFromPointer(e.clientX,e.clientY)});C.addEventListener('pointerdown',e=>{if(!game||game.phase!=='hero'||game.moving)return;const p=tileFromPointer(e.clientX,e.clientY),u=unitAt(p.x,p.y);if(game.skill){const s=SKILLS[game.skill];if(s.target==='tile')useSkill(game.selected,game.skill,{x:p.x,y:p.y});else if(u)useSkill(game.selected,game.skill,u);else showToast('请选择有效目标');return}if(u){selectUnit(u);return}moveSelected(p.x,p.y)});
addEventListener('keydown',e=>{if(!game)return;if(e.code==='Space'){e.preventDefault();endHeroTurn()}if(/^Digit[1-4]$/.test(e.code)){const idx=+e.code.slice(-1)-1,id=game.selected?.skills[idx];if(id){const s=SKILLS[id];if(s.target==='self')useSkill(game.selected,id,game.selected);else{game.skill=id;updateAllUI()}}}if(e.code==='KeyI'){$('#inventoryBtn').click()}});
function draw(){if(!game)return;X.clearRect(0,0,W,H);drawBackground();drawTiles();drawHighlights();drawUnits();drawParticles();if(game.shake>0)game.shake*=.85}
function drawBackground(){X.fillStyle='#080b11';X.fillRect(0,0,W,H);const g=X.createRadialGradient(W*.5,H*.5,50,W*.5,H*.5,700);g.addColorStop(0,'#17202e');g.addColorStop(1,'#07090e');X.fillStyle=g;X.fillRect(0,0,W,H)}
function drawTiles(){for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){const wall=game.map[y][x]==='#',px=OX+x*TILE,py=OY+y*TILE;X.fillStyle=wall?'#262b35':((x+y)%2?'#1b2430':'#18212b');X.fillRect(px+1,py+1,TILE-2,TILE-2);if(wall){X.fillStyle='#313846';X.fillRect(px+5,py+5,TILE-10,TILE-10);X.fillStyle='#3d4656';X.fillRect(px+8,py+8,TILE-16,10)}else{X.strokeStyle='#2b3747';X.strokeRect(px+.5,py+.5,TILE-1,TILE-1)}}}
function drawHighlights(){if(game.phase!=='hero'||!game.selected||game.selected.dead)return;const u=game.selected;if(game.skill){const s=SKILLS[game.skill];for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){if(manhattan(u,{x,y})<=s.range&&los(u,{x,y})){X.fillStyle=s.target==='ally'?'#5aa67455':'#b45a5550';X.fillRect(OX+x*TILE+3,OY+y*TILE+3,TILE-6,TILE-6)}}}else{const r=reachable(u);for(const [k,c] of r){if(c===0)continue;const [x,y]=k.split(',').map(Number);X.fillStyle='#4f83bd44';X.fillRect(OX+x*TILE+4,OY+y*TILE+4,TILE-8,TILE-8)}}if(pointer.x>=0&&pointer.y>=0&&pointer.x<COLS&&pointer.y<ROWS){X.strokeStyle='#e4c77b';X.lineWidth=2;X.strokeRect(OX+pointer.x*TILE+3,OY+pointer.y*TILE+3,TILE-6,TILE-6)}}
function drawUnits(){for(const u of game.units){if(u.dead)continue;const px=OX+(u.x+.5)*TILE,py=OY+(u.y+.5)*TILE+(game.shake?(Math.random()-.5)*game.shake:0);X.save();X.translate(px,py);X.fillStyle='#0008';X.beginPath();X.ellipse(0,20,23,8,0,0,Math.PI*2);X.fill();X.fillStyle=u.color;X.beginPath();X.arc(0,0,21,0,Math.PI*2);X.fill();X.strokeStyle=game.selected===u?'#ffe09a':u.team==='enemy'?'#e37b72':'#ced6e4';X.lineWidth=game.selected===u?4:2;X.stroke();X.fillStyle='#111722';X.font='900 20px ui-monospace';X.textAlign='center';X.textBaseline='middle';X.fillText(u.icon,0,1);X.restore();const bw=46,bx=px-bw/2,by=py-34;X.fillStyle='#0a0c11';X.fillRect(bx,by,bw,6);X.fillStyle=u.team==='enemy'?'#c15b58':'#66a978';X.fillRect(bx,by,bw*(u.hp/u.maxHp),6);if(u.status.tempHp){X.fillStyle='#a975c2';X.fillRect(bx,by+7,bw*clamp(u.status.tempHp/10,0,1),3)}}}
function drawParticles(){game.particles.forEach(p=>{const px=OX+(p.x+.5)*TILE,py=OY+(p.y+.5)*TILE-35*(1-p.life);X.globalAlpha=p.life;X.fillStyle=p.color;X.font='900 18px ui-monospace';X.textAlign='center';X.fillText(p.text,px,py);p.life-=.025});X.globalAlpha=1;game.particles=game.particles.filter(p=>p.life>0)}
function update(dt){if(!game)return;if(game.moving){const m=game.moving;m.t+=dt*8;if(m.t>=1){m.t=0;const p=m.path[m.index++];m.unit.x=p.x;m.unit.y=p.y;if(m.index>=m.path.length){game.moving=null;afterAction(m.unit)}}}draw()}
let last=performance.now();function loop(t){const dt=Math.min(.033,(t-last)/1000);last=t;update(dt);requestAnimationFrame(loop)}requestAnimationFrame(loop);
$('#newGame').onclick=()=>newGame();$('#continueGame').onclick=()=>{const s=loadGame();if(s)newGame(s);else showToast('没有可用存档')};$('#saveBtn').onclick=saveGame;$('#inventoryBtn').onclick=()=>{renderInventory();ui.inventory.classList.remove('hidden')};$('#closeInventory').onclick=()=>ui.inventory.classList.add('hidden');$('#endTurn').onclick=endHeroTurn;$('#restBtn').onclick=()=>{if(game.phase!=='hero')return;const pot=game.inventory.find(i=>i.id==='potion');if(!pot||pot.count<1){showToast('需要 1 瓶治疗药水');return}pot.count--;game.party.filter(u=>!u.dead).forEach(u=>healUnit(u,6));log('小队进行短休，恢复少量生命。','good');updateAllUI()};$('#panelBtn').onclick=()=>ui.side.classList.toggle('open');if(!loadGame())$('#continueGame').disabled=true;
})();
</script>
